<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Discord Transcriber</title>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: rgba(0, 0, 0, 0.85);
    color: #fff;
    font-family: 'Segoe UI', 'Helvetica Neue', Arial, sans-serif;
    font-size: 16px;
    height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* Header bar */
  #header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 8px 16px;
    background: rgba(255,255,255,0.05);
    border-bottom: 1px solid rgba(255,255,255,0.1);
    flex-shrink: 0;
  }
  #header .title { font-size: 14px; color: #aaa; }
  #header .controls { display: flex; gap: 8px; align-items: center; }
  #header button {
    background: rgba(255,255,255,0.1);
    border: 1px solid rgba(255,255,255,0.2);
    color: #ccc;
    padding: 4px 12px;
    border-radius: 4px;
    cursor: pointer;
    font-size: 13px;
  }
  #header button:hover { background: rgba(255,255,255,0.2); color: #fff; }
  #header select {
    background: rgba(255,255,255,0.1);
    border: 1px solid rgba(255,255,255,0.2);
    color: #ccc;
    padding: 4px 8px;
    border-radius: 4px;
    font-size: 13px;
  }
  #status {
    font-size: 11px;
    padding: 2px 8px;
    border-radius: 10px;
  }
  #status.connected { color: #4a4; border: 1px solid #4a4; }
  #status.disconnected { color: #a44; border: 1px solid #a44; }

  /* Transcript area */
  #transcript-area {
    flex: 1;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
    padding: 12px 16px;
  }
  #transcript {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }
  .line {
    padding: 3px 8px;
    border-radius: 3px;
    line-height: 1.5;
    transition: opacity 1s ease-out;
  }
  .partial {
    color: #888;
    font-style: italic;
    background: rgba(255,255,255,0.02);
  }
  .final {
    color: #eee;
    background: rgba(255,255,255,0.04);
  }
  .translation {
    color: #7ecfcf;
    font-size: 15px;
    padding-left: 16px;
    background: rgba(126,207,207,0.05);
  }
  .speaker-label {
    color: #c9a0dc;
    font-weight: 600;
    margin-right: 6px;
    font-size: 13px;
  }
  .latency {
    font-size: 10px;
    color: #555;
    margin-left: 8px;
  }
  .fading { opacity: 0; }

  /* Summary panel */
  #summary-panel {
    display: none;
    border-top: 1px solid rgba(255,255,255,0.1);
    background: rgba(255,255,255,0.03);
    flex-shrink: 0;
    position: relative;
  }
  #summary-panel.visible { display: flex; flex-direction: column; }

  /* Resize handle */
  #summary-resize {
    height: 6px;
    cursor: ns-resize;
    background: rgba(255,255,255,0.08);
    flex-shrink: 0;
  }
  #summary-resize:hover { background: rgba(255,255,255,0.2); }

  #summary-body {
    padding: 12px 16px;
    overflow-y: auto;
    flex: 1;
  }
  #summary-panel h3 {
    color: #aaa;
    font-size: 13px;
    margin-bottom: 8px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  #summary-panel h3 button {
    background: none;
    border: none;
    color: #888;
    cursor: pointer;
    font-size: 16px;
    padding: 0 4px;
  }
  #summary-panel h3 button:hover { color: #fff; }
  #summary-loading {
    color: #888;
    font-style: italic;
    display: none;
  }

  /* Markdown content styling */
  #summary-content {
    color: #ddd;
    font-size: 14px;
    line-height: 1.7;
  }
  #summary-content h1, #summary-content h2, #summary-content h3,
  #summary-content h4, #summary-content h5, #summary-content h6 {
    color: #fff;
    margin: 12px 0 6px 0;
    font-size: 15px;
  }
  #summary-content h1 { font-size: 18px; }
  #summary-content h2 { font-size: 16px; }
  #summary-content ul, #summary-content ol {
    padding-left: 20px;
    margin: 4px 0;
  }
  #summary-content li { margin: 3px 0; }
  #summary-content p { margin: 6px 0; }
  #summary-content strong { color: #fff; }
  #summary-content em { color: #bbb; }
  #summary-content blockquote {
    border-left: 3px solid rgba(255,255,255,0.2);
    padding-left: 12px;
    margin: 6px 0;
    color: #aaa;
  }
  #summary-content code {
    background: rgba(255,255,255,0.1);
    padding: 1px 5px;
    border-radius: 3px;
    font-size: 13px;
  }
  #summary-content hr {
    border: none;
    border-top: 1px solid rgba(255,255,255,0.15);
    margin: 10px 0;
  }
</style>
</head>
<body>

<div id="header">
  <div style="display:flex;align-items:center;gap:12px;">
    <span class="title">Discord Transcriber</span>
    <span id="status" class="disconnected">disconnected</span>
    <span id="stats" style="font-size:11px;color:#666;"></span>
  </div>
  <div class="controls">
    <select id="summary-style">
      <option value="overview">Overview</option>
      <option value="detailed">Detailed</option>
      <option value="action_items">Action Items</option>
    </select>
    <button onclick="requestSummary()">Summarize</button>
    <button onclick="saveSession()">Save</button>
  </div>
</div>

<div id="transcript-area">
  <div id="transcript"></div>
</div>

<div id="summary-panel">
  <div id="summary-resize"></div>
  <div id="summary-body">
    <h3>
      <span>Summary</span>
      <button onclick="closeSummary()" title="Close">&times;</button>
    </h3>
    <div id="summary-loading">Generating summary...</div>
    <div id="summary-content"></div>
  </div>
</div>

<script>
  const container = document.getElementById('transcript');
  const statusEl = document.getElementById('status');
  const statsEl = document.getElementById('stats');
  const MAX_LINES = 25;

  let partialEl = null;
  let ws = null;
  let entryCount = 0;

  function connect() {
    ws = new WebSocket(`ws://${location.host}/ws`);

    ws.onopen = () => {
      statusEl.textContent = 'connected';
      statusEl.className = 'connected';
    };

    ws.onclose = () => {
      statusEl.textContent = 'disconnected';
      statusEl.className = 'disconnected';
      setTimeout(connect, 2000);
    };

    ws.onerror = () => { ws.close(); };

    ws.onmessage = (event) => {
      const data = JSON.parse(event.data);

      if (data.type === 'partial') {
        if (!partialEl) {
          partialEl = document.createElement('div');
          partialEl.className = 'line partial';
          container.appendChild(partialEl);
        }
        let content = '';
        if (data.speaker) {
          content += `<span class="speaker-label">${escHtml(data.speaker)}</span>`;
        }
        content += escHtml(data.text);
        if (data.latency_ms != null) {
          content += `<span class="latency">${data.latency_ms}ms</span>`;
        }
        partialEl.innerHTML = content;

      } else if (data.type === 'final') {
        if (partialEl) {
          partialEl.remove();
          partialEl = null;
        }
        const el = document.createElement('div');
        el.className = 'line final';
        if (data.msg_id) el.dataset.msgId = data.msg_id;
        let content = '';
        if (data.speaker) {
          content += `<span class="speaker-label">${escHtml(data.speaker)}</span>`;
        }
        content += escHtml(data.text);
        if (data.latency_ms != null) {
          content += `<span class="latency">${data.latency_ms}ms</span>`;
        }
        el.innerHTML = content;
        container.appendChild(el);
        entryCount++;
        statsEl.textContent = `${entryCount} entries`;

      } else if (data.type === 'translation') {
        const el = document.createElement('div');
        el.className = 'line translation';
        el.textContent = data.text;
        const target = data.msg_id
          ? container.querySelector(`[data-msg-id="${data.msg_id}"]`)
          : null;
        if (target) {
          let insertAfter = target;
          while (insertAfter.nextSibling &&
                 insertAfter.nextSibling.classList &&
                 insertAfter.nextSibling.classList.contains('translation')) {
            insertAfter = insertAfter.nextSibling;
          }
          insertAfter.after(el);
        } else {
          container.appendChild(el);
        }

      } else if (data.type === 'split') {
        // Replace a single line with multiple speaker-split lines (instant, no animation)
        const target = data.original_msg_id
          ? container.querySelector(`[data-msg-id="${data.original_msg_id}"]`)
          : null;
        if (target && data.parts) {
          // Also collect any translation lines that follow the original
          const translations = [];
          let sibling = target.nextSibling;
          while (sibling && sibling.classList && sibling.classList.contains('translation')) {
            translations.push(sibling);
            sibling = sibling.nextSibling;
          }

          // Insert new split lines before the original
          for (const part of data.parts) {
            const el = document.createElement('div');
            el.className = 'line final';
            el.dataset.msgId = part.msg_id;
            let content = '';
            if (part.speaker) {
              content += `<span class="speaker-label">${escHtml(part.speaker)}</span>`;
            }
            content += escHtml(part.text);
            el.innerHTML = content;
            target.before(el);
          }

          // Remove the original line and its translations
          for (const tr of translations) tr.remove();
          target.remove();
        }

      } else if (data.type === 'speaker_update') {
        const target = data.msg_id
          ? container.querySelector(`[data-msg-id="${data.msg_id}"]`)
          : null;
        if (target) {
          let existing = target.querySelector('.speaker-label');
          if (existing) {
            existing.textContent = data.speaker;
          } else {
            const badge = document.createElement('span');
            badge.className = 'speaker-label';
            badge.textContent = data.speaker;
            target.prepend(badge);
          }
        }
      }

      // Enforce 25-line limit
      while (container.children.length > MAX_LINES) {
        container.removeChild(container.firstChild);
      }
    };
  }

  function escHtml(s) {
    const d = document.createElement('div');
    d.appendChild(document.createTextNode(s));
    return d.innerHTML;
  }

  // --- Summary ---

  async function requestSummary() {
    const panel = document.getElementById('summary-panel');
    const loading = document.getElementById('summary-loading');
    const content = document.getElementById('summary-content');
    const style = document.getElementById('summary-style').value;

    panel.classList.add('visible');
    if (!panel.style.height) panel.style.height = '300px';
    loading.style.display = 'block';
    content.innerHTML = '';

    try {
      const res = await fetch('/api/summarize', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ style }),
      });
      const data = await res.json();
      loading.style.display = 'none';

      if (data.error) {
        content.textContent = 'Error: ' + data.error;
      } else {
        content.innerHTML = marked.parse(data.summary);
      }
    } catch (e) {
      loading.style.display = 'none';
      content.textContent = 'Request failed: ' + e.message;
    }
  }

  function closeSummary() {
    document.getElementById('summary-panel').classList.remove('visible');
  }

  async function saveSession() {
    try {
      const res = await fetch('/api/session/save', { method: 'POST' });
      const data = await res.json();
      if (data.saved) {
        alert('Session saved: ' + data.saved);
      } else {
        alert('Error: ' + data.error);
      }
    } catch (e) {
      alert('Save failed: ' + e.message);
    }
  }

  // --- Summary panel resize ---
  (function() {
    const panel = document.getElementById('summary-panel');
    const handle = document.getElementById('summary-resize');
    let startY, startH;

    handle.addEventListener('mousedown', (e) => {
      startY = e.clientY;
      startH = panel.offsetHeight;
      document.addEventListener('mousemove', onDrag);
      document.addEventListener('mouseup', onStop);
      e.preventDefault();
    });

    function onDrag(e) {
      const delta = startY - e.clientY;
      const newH = Math.max(100, Math.min(window.innerHeight * 0.8, startH + delta));
      panel.style.height = newH + 'px';
    }

    function onStop() {
      document.removeEventListener('mousemove', onDrag);
      document.removeEventListener('mouseup', onStop);
    }
  })();

  connect();
</script>
</body>
</html>
