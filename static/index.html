<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Discord Transcriber</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: rgba(0, 0, 0, 0.85);
    color: #fff;
    font-family: 'Segoe UI', 'Helvetica Neue', Arial, sans-serif;
    font-size: 16px;
    height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* Header bar */
  #header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 8px 16px;
    background: rgba(255,255,255,0.05);
    border-bottom: 1px solid rgba(255,255,255,0.1);
    flex-shrink: 0;
  }
  #header .title { font-size: 14px; color: #aaa; }
  #header .controls { display: flex; gap: 8px; align-items: center; }
  #header button {
    background: rgba(255,255,255,0.1);
    border: 1px solid rgba(255,255,255,0.2);
    color: #ccc;
    padding: 4px 12px;
    border-radius: 4px;
    cursor: pointer;
    font-size: 13px;
  }
  #header button:hover { background: rgba(255,255,255,0.2); color: #fff; }
  #header select {
    background: rgba(255,255,255,0.1);
    border: 1px solid rgba(255,255,255,0.2);
    color: #ccc;
    padding: 4px 8px;
    border-radius: 4px;
    font-size: 13px;
  }
  #status {
    font-size: 11px;
    padding: 2px 8px;
    border-radius: 10px;
  }
  #status.connected { color: #4a4; border: 1px solid #4a4; }
  #status.disconnected { color: #a44; border: 1px solid #a44; }

  /* Transcript area */
  #transcript-area {
    flex: 1;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
    padding: 12px 16px;
  }
  #transcript {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }
  .line {
    padding: 3px 8px;
    border-radius: 3px;
    line-height: 1.5;
    transition: opacity 1s ease-out;
  }
  .partial {
    color: #888;
    font-style: italic;
    background: rgba(255,255,255,0.02);
  }
  .final {
    color: #eee;
    background: rgba(255,255,255,0.04);
  }
  .translation {
    color: #7ecfcf;
    font-size: 15px;
    padding-left: 16px;
    background: rgba(126,207,207,0.05);
  }
  .speaker-label {
    color: #c9a0dc;
    font-weight: 600;
    margin-right: 6px;
    font-size: 13px;
  }
  .latency {
    font-size: 10px;
    color: #555;
    margin-left: 8px;
  }
  .fading { opacity: 0; }

  /* Summary panel */
  #summary-panel {
    display: none;
    border-top: 1px solid rgba(255,255,255,0.1);
    padding: 12px 16px;
    max-height: 40vh;
    overflow-y: auto;
    background: rgba(255,255,255,0.03);
    flex-shrink: 0;
  }
  #summary-panel.visible { display: block; }
  #summary-panel h3 {
    color: #aaa;
    font-size: 13px;
    margin-bottom: 8px;
  }
  #summary-content {
    color: #ddd;
    font-size: 14px;
    line-height: 1.7;
    white-space: pre-wrap;
  }
  #summary-loading {
    color: #888;
    font-style: italic;
    display: none;
  }
</style>
</head>
<body>

<div id="header">
  <div style="display:flex;align-items:center;gap:12px;">
    <span class="title">Discord Transcriber</span>
    <span id="status" class="disconnected">disconnected</span>
    <span id="stats" style="font-size:11px;color:#666;"></span>
  </div>
  <div class="controls">
    <select id="summary-style">
      <option value="overview">Overview</option>
      <option value="detailed">Detailed</option>
      <option value="action_items">Action Items</option>
    </select>
    <button onclick="requestSummary()">Summarize</button>
    <button onclick="saveSession()">Save</button>
  </div>
</div>

<div id="transcript-area">
  <div id="transcript"></div>
</div>

<div id="summary-panel">
  <h3>Summary</h3>
  <div id="summary-loading">Generating summary...</div>
  <div id="summary-content"></div>
</div>

<script>
  const container = document.getElementById('transcript');
  const statusEl = document.getElementById('status');
  const statsEl = document.getElementById('stats');
  const MAX_LINES = 25;

  let partialEl = null;
  let ws = null;
  let entryCount = 0;

  function connect() {
    ws = new WebSocket(`ws://${location.host}/ws`);

    ws.onopen = () => {
      statusEl.textContent = 'connected';
      statusEl.className = 'connected';
    };

    ws.onclose = () => {
      statusEl.textContent = 'disconnected';
      statusEl.className = 'disconnected';
      setTimeout(connect, 2000);
    };

    ws.onerror = () => { ws.close(); };

    ws.onmessage = (event) => {
      const data = JSON.parse(event.data);

      if (data.type === 'partial') {
        if (!partialEl) {
          partialEl = document.createElement('div');
          partialEl.className = 'line partial';
          container.appendChild(partialEl);
        }
        let content = '';
        if (data.speaker) {
          content += `<span class="speaker-label">${escHtml(data.speaker)}</span>`;
        }
        content += escHtml(data.text);
        if (data.latency_ms != null) {
          content += `<span class="latency">${data.latency_ms}ms</span>`;
        }
        partialEl.innerHTML = content;

      } else if (data.type === 'final') {
        if (partialEl) {
          partialEl.remove();
          partialEl = null;
        }
        const el = document.createElement('div');
        el.className = 'line final';
        if (data.msg_id) el.dataset.msgId = data.msg_id;
        let content = '';
        if (data.speaker) {
          content += `<span class="speaker-label">${escHtml(data.speaker)}</span>`;
        }
        content += escHtml(data.text);
        if (data.latency_ms != null) {
          content += `<span class="latency">${data.latency_ms}ms</span>`;
        }
        el.innerHTML = content;
        container.appendChild(el);
        entryCount++;
        statsEl.textContent = `${entryCount} entries`;

      } else if (data.type === 'translation') {
        const el = document.createElement('div');
        el.className = 'line translation';
        el.textContent = data.text;
        // Insert after the matching final line
        const target = data.msg_id
          ? container.querySelector(`[data-msg-id="${data.msg_id}"]`)
          : null;
        if (target) {
          // Insert right after target (or after target's existing translation)
          let insertAfter = target;
          while (insertAfter.nextSibling &&
                 insertAfter.nextSibling.classList &&
                 insertAfter.nextSibling.classList.contains('translation')) {
            insertAfter = insertAfter.nextSibling;
          }
          insertAfter.after(el);
        } else {
          container.appendChild(el);
        }

      } else if (data.type === 'speaker_update') {
        // Post-hoc speaker label update
        const target = data.msg_id
          ? container.querySelector(`[data-msg-id="${data.msg_id}"]`)
          : null;
        if (target) {
          // Prepend speaker label if not already present
          let existing = target.querySelector('.speaker-label');
          if (existing) {
            existing.textContent = data.speaker;
          } else {
            const badge = document.createElement('span');
            badge.className = 'speaker-label';
            badge.textContent = data.speaker;
            target.prepend(badge);
          }
        }
      }

      // Enforce 25-line limit
      while (container.children.length > MAX_LINES) {
        container.removeChild(container.firstChild);
      }
    };
  }

  function escHtml(s) {
    const d = document.createElement('div');
    d.appendChild(document.createTextNode(s));
    return d.innerHTML;
  }

  async function requestSummary() {
    const panel = document.getElementById('summary-panel');
    const loading = document.getElementById('summary-loading');
    const content = document.getElementById('summary-content');
    const style = document.getElementById('summary-style').value;

    panel.classList.add('visible');
    loading.style.display = 'block';
    content.textContent = '';

    try {
      const res = await fetch('/api/summarize', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ style }),
      });
      const data = await res.json();
      loading.style.display = 'none';

      if (data.error) {
        content.textContent = 'Error: ' + data.error;
      } else {
        content.textContent = data.summary;
      }
    } catch (e) {
      loading.style.display = 'none';
      content.textContent = 'Request failed: ' + e.message;
    }
  }

  async function saveSession() {
    try {
      const res = await fetch('/api/session/save', { method: 'POST' });
      const data = await res.json();
      if (data.saved) {
        alert('Session saved: ' + data.saved);
      } else {
        alert('Error: ' + data.error);
      }
    } catch (e) {
      alert('Save failed: ' + e.message);
    }
  }

  connect();
</script>
</body>
</html>
